<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Batch by Platter - A Calmer Weekly Food Planner</title>
    <meta name="description" content="Batch by Platter turns a few practical answers into a weekly food plan with recipes, prep notes, and prepared meal backup where it helps." />
    <meta name="batch-build" content="platter-system-2026-07-17" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Instrument+Sans:wght@500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --canvas: #f7f7f7;
        --paper: #ffffff;
        --surface: #ffffff;
        --white: #ffffff;
        --cream: #f7f7f7;
        --cream-deep: #ececea;
        --sand: #a84d37;
        --sand-soft: #f3f1ee;
        --sage: #e0e5d8;
        --sage-strong: #aeb9a1;
        --olive: #151515;
        --olive-soft: #f1f1ef;
        --ink: #151515;
        --muted: #62625d;
        --line: #d3d3d3;
        --rule: #151515;
        --accent: #a84d37;
        --accent-soft: #e7e2df;
        --charcoal: #252525;
        --tomato: #a84d37;
        --marigold: #a84d37;
        --display: "Instrument Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        --poster: "Bebas Neue", "Arial Narrow", Impact, sans-serif;
        --sans: "Instrument Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        --shadow-soft: none;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: var(--canvas);
        color: var(--ink);
        font-family: var(--sans);
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
      }

      button,
      input {
        font: inherit;
      }

      img {
        max-width: 100%;
      }

      .batch-page {
        min-height: 100vh;
        background:
          linear-gradient(90deg, rgba(21, 21, 21, 0.045) 1px, transparent 1px),
          linear-gradient(180deg, rgba(21, 21, 21, 0.035) 1px, transparent 1px),
          var(--canvas);
        background-size: 120px 120px;
        overflow-x: hidden;
      }

      .marketing-page {
        min-height: 100vh;
        background:
          radial-gradient(circle at 78% 18%, rgba(168, 77, 55, 0.08), transparent 28%),
          linear-gradient(180deg, #fff 0%, var(--canvas) 62%, #fff 100%);
      }

      .marketing-nav {
        min-height: 76px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 24px;
        padding: 18px clamp(24px, 5vw, 72px);
        border-bottom: 1px solid var(--rule);
        background: rgba(255, 255, 255, 0.94);
        position: sticky;
        top: 0;
        z-index: 12;
      }

      .marketing-links {
        display: flex;
        align-items: center;
        gap: 18px;
      }

      .marketing-links a {
        color: var(--muted);
        font-size: 13px;
        font-weight: 850;
        letter-spacing: 0.03em;
        text-decoration: none;
        text-transform: uppercase;
      }

      .marketing-links a:hover {
        color: var(--ink);
      }

      .beta-status {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        min-height: 34px;
        border: 1px solid var(--line);
        background: var(--paper);
        color: var(--muted);
        font-size: 12px;
        font-weight: 900;
        letter-spacing: 0.08em;
        padding: 0 12px;
        text-transform: uppercase;
      }

      .beta-status::before {
        content: "";
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: var(--accent);
      }

      .nav-cta,
      .landing-button {
        min-height: 44px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--rule);
        border-radius: 0;
        background: var(--ink);
        color: #fff;
        cursor: pointer;
        font-weight: 850;
        padding: 0 18px;
        text-decoration: none;
      }

      .nav-cta:hover,
      .landing-button:hover {
        background: var(--accent);
        border-color: var(--accent);
      }

      .landing-button.is-secondary {
        background: var(--paper);
        color: var(--ink);
      }

      .landing-button.is-secondary:hover {
        background: var(--olive-soft);
        border-color: var(--rule);
      }

      .marketing-hero,
      .landing-section {
        width: min(100% - 48px, 1500px);
        margin: 0 auto;
      }

      .marketing-hero {
        display: grid;
        grid-template-columns: minmax(0, 0.86fr) minmax(360px, 0.68fr);
        gap: clamp(40px, 7vw, 118px);
        align-items: center;
        min-height: calc(100vh - 76px);
        padding: clamp(44px, 7vw, 96px) 0;
      }

      .landing-copy {
        display: grid;
        gap: 24px;
      }

      .landing-kicker,
      .section-kicker {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        color: var(--muted);
        font-family: var(--poster);
        font-size: 16px;
        font-weight: 400;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .landing-kicker::before,
      .section-kicker::before {
        content: "";
        width: 36px;
        height: 1px;
        background: var(--accent);
      }

      .landing-copy h1,
      .landing-section h2 {
        margin: 0;
        color: var(--ink);
        font-family: var(--display);
        font-weight: 900;
        letter-spacing: 0;
      }

      .landing-copy h1 {
        max-width: 980px;
        font-size: clamp(70px, 7vw, 120px);
        line-height: 0.88;
      }

      .landing-section h2 {
        max-width: 1160px;
        font-size: clamp(48px, 5.2vw, 82px);
        line-height: 0.9;
      }

      .landing-copy p,
      .landing-section p {
        margin: 0;
        color: var(--muted);
        font-size: clamp(18px, 2vw, 23px);
        line-height: 1.38;
      }

      .landing-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }

      .landing-stats {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        border-top: 1px solid var(--rule);
        border-bottom: 1px solid var(--rule);
      }

      .landing-stats div {
        min-height: 98px;
        display: grid;
        align-content: center;
        gap: 6px;
        border-right: 1px solid var(--line);
        padding: 16px 18px;
      }

      .landing-stats div:last-child {
        border-right: 0;
      }

      .landing-stats strong {
        color: var(--accent);
        font-family: var(--poster);
        font-size: 40px;
        font-weight: 400;
        line-height: 0.9;
        text-transform: uppercase;
      }

      .landing-stats span {
        color: var(--muted);
        font-size: 12px;
        font-weight: 850;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .landing-device {
        width: min(100%, 392px);
        justify-self: center;
        display: grid;
        gap: 14px;
      }

      .landing-device .preview-phone {
        aspect-ratio: 393 / 852;
        box-shadow: none;
      }

      .landing-device .preview-phone .screen {
        overflow: hidden;
      }

      .landing-device .preview-phone .primary-button {
        background: var(--ink);
        color: #fff;
        border-color: var(--ink);
        box-shadow: none;
      }

      .landing-device .preview-phone .hero-plate {
        min-height: 238px;
      }

      .landing-device .preview-phone .hero-plate img {
        height: 184px;
      }

      .landing-caption {
        color: var(--muted);
        font-size: 13px;
        font-weight: 850;
        letter-spacing: 0.08em;
        text-align: center;
        text-transform: uppercase;
      }

      .landing-section {
        padding: clamp(54px, 8vw, 112px) 0;
        border-top: 1px solid var(--rule);
      }

      .landing-grid,
      .landing-index {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 18px;
        margin-top: 32px;
      }

      .landing-card {
        display: grid;
        align-content: start;
        gap: 16px;
        min-height: 250px;
        border: 1px solid var(--line);
        background: var(--paper);
        padding: clamp(22px, 3vw, 34px);
      }

      .landing-card span {
        color: var(--accent);
        font-family: var(--poster);
        font-size: 34px;
        line-height: 0.9;
      }

      .landing-card h3 {
        margin: 0;
        font-family: var(--display);
        font-size: clamp(28px, 3vw, 44px);
        font-weight: 900;
        line-height: 0.96;
      }

      .landing-card p {
        font-size: 16px;
        line-height: 1.45;
      }

      .landing-feature {
        display: grid;
        grid-template-columns: minmax(0, 0.82fr) minmax(0, 1fr);
        gap: clamp(28px, 6vw, 88px);
        align-items: center;
      }

      .feature-phone-row {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
      }

      .feature-phone-row .preview-phone {
        aspect-ratio: 393 / 585;
      }

      .landing-index {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .landing-index .landing-card {
        min-height: 190px;
      }

      .beta-panel {
        display: grid;
        gap: 18px;
        border: 1px solid var(--rule);
        background: var(--paper);
        padding: clamp(22px, 3vw, 34px);
      }

      .beta-panel strong {
        display: block;
        color: var(--ink);
        font-size: clamp(24px, 2.6vw, 38px);
        font-weight: 900;
        line-height: 1;
      }

      .beta-panel p {
        font-size: 17px;
      }

      .beta-panel-row {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 1px;
        background: var(--line);
        border: 1px solid var(--line);
      }

      .beta-panel-row span {
        min-height: 78px;
        display: grid;
        align-content: center;
        gap: 4px;
        background: var(--paper);
        padding: 14px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 850;
        letter-spacing: 0.07em;
        text-transform: uppercase;
      }

      .beta-panel-row b {
        color: var(--accent);
        font-family: var(--poster);
        font-size: 28px;
        font-weight: 400;
        line-height: 0.9;
      }

      .screens-page {
        min-height: 100vh;
        background:
          linear-gradient(90deg, rgba(21, 21, 21, 0.04) 1px, transparent 1px),
          linear-gradient(180deg, rgba(21, 21, 21, 0.03) 1px, transparent 1px),
          #fff;
        background-size: 112px 112px;
      }

      .screens-hero,
      .screens-gallery {
        width: min(100% - 48px, 1440px);
        margin: 0 auto;
      }

      .screens-hero {
        display: grid;
        grid-template-columns: minmax(0, 0.82fr) minmax(320px, 0.5fr);
        gap: clamp(32px, 6vw, 92px);
        align-items: end;
        padding: clamp(58px, 8vw, 118px) 0 clamp(30px, 5vw, 64px);
      }

      .screens-hero h1 {
        max-width: 820px;
        font-size: clamp(64px, 7vw, 118px);
      }

      .screens-hero p {
        max-width: 650px;
      }

      .screens-note {
        border: 1px solid var(--rule);
        background: rgba(255, 255, 255, 0.86);
        padding: 22px;
      }

      .screens-note strong {
        display: block;
        margin-bottom: 8px;
        font-size: 19px;
        font-weight: 900;
      }

      .screens-gallery {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: clamp(16px, 2vw, 26px);
        padding-bottom: clamp(54px, 8vw, 110px);
      }

      .screen-shot {
        display: grid;
        gap: 12px;
      }

      .screen-shot .preview-phone {
        aspect-ratio: 393 / 760;
        box-shadow: 0 22px 50px rgba(21, 21, 21, 0.08);
      }

      .screen-shot strong {
        color: var(--ink);
        font-size: 18px;
        font-weight: 900;
        line-height: 1.05;
      }

      .screen-shot span {
        color: var(--muted);
        font-size: 13px;
        font-weight: 750;
        line-height: 1.35;
      }

      .marketing-footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 24px;
        padding: 28px clamp(24px, 5vw, 72px);
        border-top: 1px solid var(--rule);
        background: var(--paper);
        color: var(--muted);
        font-size: 13px;
        font-weight: 800;
      }

      .top-bar {
        min-height: 74px;
        display: grid;
        grid-template-columns: auto minmax(180px, 680px) auto;
        align-items: center;
        gap: 16px;
        padding: 12px clamp(18px, 4vw, 56px);
        border-bottom: 1px solid var(--rule);
        background: rgba(255, 255, 255, 0.94);
        backdrop-filter: blur(16px);
        position: sticky;
        top: 0;
        z-index: 10;
      }

      .brand {
        position: relative;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: var(--ink);
        font-family: var(--sans);
        font-size: 20px;
        font-weight: 900;
        letter-spacing: 0.01em;
        line-height: 1;
        padding: 0 42px 8px 0;
        text-decoration: none;
        text-transform: uppercase;
      }

      .brand::before,
      .brand::after {
        content: "";
        position: absolute;
        pointer-events: none;
      }

      .brand::before {
        left: 46%;
        right: 27px;
        bottom: 0;
        height: 2px;
        background: var(--accent);
      }

      .brand::after {
        right: 0;
        bottom: 0;
        width: 31px;
        height: 16px;
        border-right: 2px solid var(--accent);
        border-bottom: 2px solid var(--accent);
        transform: skewX(-27deg);
        transform-origin: right bottom;
      }

      .progress {
        display: block;
        color: var(--muted);
        font-size: 12px;
        margin-top: 3px;
        font-weight: 800;
      }

      .top-progress {
        width: 100%;
        display: grid;
        gap: 6px;
      }

      .progress-label {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        color: var(--muted);
        font-family: var(--poster);
        font-size: 13px;
        font-weight: 800;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }

      .progress-track {
        height: 5px;
        border-radius: 0;
        background: var(--cream-deep);
        overflow: hidden;
      }

      .progress-track span {
        display: block;
        height: 100%;
        background: var(--accent);
        transition: width 260ms ease;
      }

      .top-controls {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 8px;
      }

      .mode-toggle {
        display: inline-flex;
        padding: 2px;
        border: 1px solid var(--rule);
        border-radius: 999px;
        background: var(--paper);
      }

      .mode-toggle button,
      .nav-button {
        min-height: 34px;
        border: 0;
        border-radius: 999px;
        background: transparent;
        color: var(--ink);
        cursor: pointer;
        font-family: var(--poster);
        font-size: 15px;
        font-weight: 400;
        letter-spacing: 0.08em;
        padding: 0 13px;
        text-transform: uppercase;
        transition: background 160ms ease, color 160ms ease;
      }

      .mode-toggle button:hover,
      .nav-button:hover {
        background: var(--olive-soft);
      }

      .mode-toggle .is-active,
      .nav-button {
        background: var(--rule);
        color: #fff;
      }

      .mode-toggle .is-active:hover,
      .nav-button:hover {
        background: var(--accent);
        color: #fff;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.48;
      }

      .flow-view {
        width: 100%;
        min-height: calc(100vh - 74px);
        display: grid;
        grid-template-columns: minmax(0, 430px) minmax(420px, 620px);
        align-items: center;
        justify-content: center;
        gap: clamp(34px, 6vw, 96px);
        padding: clamp(18px, 3vw, 36px);
      }

      .flow-primary {
        width: min(100%, 430px);
        display: grid;
        gap: 14px;
      }

      .flow-controls {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1.2fr);
        gap: 10px;
      }

      .flow-control {
        min-height: 48px;
        border: 1px solid var(--rule);
        border-radius: 0;
        background: var(--paper);
        color: var(--ink);
        cursor: pointer;
        font-family: var(--poster);
        font-size: 17px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .flow-control.is-primary {
        background: var(--ink);
        color: #fff;
      }

      .flow-control:hover {
        background: var(--olive-soft);
      }

      .flow-control.is-primary:hover {
        background: var(--accent);
        border-color: var(--accent);
      }

      .dots {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 7px;
        padding: 4px 0 16px;
      }

      .dots button {
        width: 8px;
        height: 8px;
        padding: 0;
        border: 0;
        border-radius: 999px;
        background: #bebebb;
        cursor: pointer;
      }

      .dots .is-active,
      .dots button:hover {
        background: var(--olive);
      }

      .screen-stage {
        width: min(100%, 430px);
        height: min(760px, calc(100vh - 220px));
        overflow: hidden;
        touch-action: pan-y;
        border: 9px solid var(--rule);
        border-radius: 34px;
        background: var(--rule);
      }

      .enter-forward {
        animation: enter-forward 260ms ease both;
      }

      .enter-backward {
        animation: enter-backward 260ms ease both;
      }

      .screen {
        width: 100%;
        height: 100%;
        min-height: 0;
        display: flex;
        flex-direction: column;
        gap: 18px;
        padding: 26px;
        background: var(--surface);
        border: 0;
        border-radius: 24px;
        overflow: auto;
        scrollbar-width: none;
      }

      .screen::-webkit-scrollbar {
        display: none;
      }

      .flow-aside {
        width: min(100%, 560px);
        height: min(760px, calc(100vh - 220px));
        position: relative;
        display: grid;
        align-content: center;
        gap: 22px;
        overflow: hidden;
        padding: clamp(28px, 4vw, 48px);
        border-left: 1px solid var(--rule);
        background: rgba(255, 255, 255, 0.58);
      }

      .flow-aside::before {
        content: "B";
        position: absolute;
        right: -48px;
        top: 50%;
        color: rgba(21, 21, 21, 0.045);
        font-family: var(--display);
        font-size: clamp(260px, 34vw, 520px);
        font-weight: 700;
        line-height: 0.8;
        transform: translateY(-50%) rotate(-10deg);
      }

      .aside-copy,
      .aside-proof,
      .aside-collage {
        position: relative;
        z-index: 1;
      }

      .aside-copy {
        display: grid;
        gap: 10px;
        max-width: 500px;
      }

      .aside-copy span {
        color: var(--muted);
        font-family: var(--poster);
        font-size: 14px;
        font-weight: 400;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }

      .aside-copy strong {
        font-family: var(--display);
        font-size: clamp(34px, 3.8vw, 52px);
        font-weight: 900;
        line-height: 0.9;
        letter-spacing: 0;
      }

      .aside-copy p {
        margin: 0;
        color: var(--muted);
        font-size: 16px;
        line-height: 1.45;
      }

      .aside-collage {
        width: min(100%, 420px);
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
        transform: rotate(-2deg);
      }

      .aside-collage img {
        width: 100%;
        aspect-ratio: 1;
        border: 1px solid var(--line);
        border-radius: 0;
        object-fit: cover;
      }

      .aside-collage img:nth-child(1) {
        grid-row: span 2;
        aspect-ratio: 1 / 2.05;
      }

      .aside-proof {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
        max-width: 440px;
      }

      .aside-proof div {
        border-top: 1px solid var(--line);
        padding-top: 10px;
      }

      .aside-proof strong {
        display: block;
        color: var(--accent);
        font-family: var(--poster);
        font-size: 34px;
        font-weight: 400;
        line-height: 1;
      }

      .aside-proof span {
        display: block;
        margin-top: 5px;
        color: var(--muted);
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.05em;
        line-height: 1.25;
        text-transform: uppercase;
      }

      .screen-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }

      .kicker,
      .screen-count,
      .control-label,
      .logo-row span,
      .meal-card span,
      .plan-card span {
        color: var(--muted);
        font-family: var(--poster);
        font-size: 13px;
        font-weight: 400;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-family: var(--display);
        font-size: clamp(40px, 10vw, 56px);
        font-weight: 900;
        line-height: 0.92;
        letter-spacing: 0;
      }

      .accent-word {
        color: var(--accent);
        font-style: normal;
      }

      .lede {
        margin: 0;
        color: var(--muted);
        font-size: 16px;
        line-height: 1.45;
      }

      .hero-plate {

      const recommendedMealPhoto =
        "https://cu-media.imgix.net/meal-service/meals/2954/main_image/006_Esther-Choi_Chicken-soba-salad-with-sesame_lowres.jpg?height=800&width=800&fit=crop&format=webp&cs=tinysrgb&lossless=true?w=3840";
      const defaultRecipes = {
        lunch: "Fresh Avocado & Hummus Wrap with crisp garden greens",
        dinner: "Sauteed Lemon Garlic Shrimp with roasted asparagus and herbed wild rice",

      const dietaryChips = [

          summary: "Mostly prepared",
        },
      ];
      const meals = [
        {
          id: "soba",
          name: "Soba Noodle Salad with Chicken",
          chef: "Esther Choi",
          calories: 520,
          protein: 36,
          carbs: 42,
          diets: ["High protein", "Dairy free", "Healthy balance"],
          image: recommendedMealPhoto,
        },
        {
          id: "salmon",

          chef: "Cat Cora",
          calories: 580,
          protein: 38,
          carbs: 24,
          diets: ["High protein", "Pescatarian", "Gluten free"],
          image: heroMealPhoto,
        },
        {

          image:
            "https://cu-media.imgix.net/meal-service/meals/7000/main_image/7000_art-smith_lentil-bolognese-with-bucatini-pasta_wb_lo-res.jpg?height=800&width=800&fit=crop&format=webp&cs=tinysrgb&lossless=true?w=3840",
        },
        {
          id: "chicken",
          name: "Spiced Chicken with Roasted Broccoli",
          chef: "Ruben Garcia",
          calories: 540,
          protein: 41,
          carbs: 18,
          diets: ["High protein", "Gluten free", "Keto/low-carb"],
          image:
            "https://cu-media.imgix.net/media/catalog/product/cache/x600//r/u/ruben-spiced-chicken.jpeg?height=800&width=800&fit=crop&format=webp&cs=tinysrgb&lossless=true?w=3840",
        },
      ];

      const defaultState = {
        currentScreen: 0,
        answers: {
          q2Answer: "5-day-week",
          dietary: ["High protein"],
          proteinTarget: 125,
          cookTime: "30 min max",
        },
        selectedDays: ["Mon", "Tue", "Wed", "Thu", "Fri"],
        cookingStyle: "hybrid",
        weeklyPlan: {},
        mealSwaps: {},
        shoppingTab: "list",
        endState: null,
        leadEmail: "",
      };

      let state = readState();
      let mode = "landing";
      let direction = "forward";
      let pointerStartX = null;
      let statusMessage = "";
      let statusTimer = null;
      let prepTimer = null;

      function cloneDefaultState() {
        return structuredClone(defaultState);
      }

      function clampScreen(index) {
        return Math.min(Math.max(Math.round(Number(index) || 0), 0), LAST_SCREEN);
      }

      function clampProtein(value) {
        return Math.min(Math.max(Math.round((Number(value) || 125) / 5) * 5, 70), 180);
      }

      function normalizeDays(days) {
        if (!Array.isArray(days)) return [...defaultState.selectedDays];
        const clean = days.filter((day, index) => dayOrder.includes(day) && days.indexOf(day) === index);
        return clean.length ? clean.sort((a, b) => dayOrder.indexOf(a) - dayOrder.indexOf(b)) : [...defaultState.selectedDays];
      }

      function readState() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return cloneDefaultState();
          const parsed = JSON.parse(raw);
          return {
            currentScreen: clampScreen(parsed.currentScreen),
            answers: {
              q2Answer: typeof parsed.answers?.q2Answer === "string" ? parsed.answers.q2Answer : "5-day-week",
              dietary: Array.isArray(parsed.answers?.dietary) ? parsed.answers.dietary.filter(Boolean) : ["High protein"],
              proteinTarget: clampProtein(parsed.answers?.proteinTarget),
              cookTime: typeof parsed.answers?.cookTime === "string" ? parsed.answers.cookTime : "30 min max",
            },
            selectedDays: normalizeDays(parsed.selectedDays),
            cookingStyle: ["scratch", "hybrid", "zero-prep"].includes(parsed.cookingStyle) ? parsed.cookingStyle : "hybrid",
            weeklyPlan: typeof parsed.weeklyPlan === "object" && parsed.weeklyPlan ? parsed.weeklyPlan : {},
            mealSwaps: typeof parsed.mealSwaps === "object" && parsed.mealSwaps ? parsed.mealSwaps : {},
            shoppingTab: parsed.shoppingTab === "timeline" ? "timeline" : "list",
            endState: parsed.endState === "share" || parsed.endState === "start" ? parsed.endState : null,
            leadEmail: typeof parsed.leadEmail === "string" ? parsed.leadEmail : "",
          };
        } catch {
          return cloneDefaultState();
        }
      }

      function defaultChoiceFor(type) {
        if (state.cookingStyle === "scratch") return "home";
        if (state.cookingStyle === "zero-prep") return "chef";
        return type === "lunch" ? "home" : "chef";
      }

      function normalizeChoice(choice, type) {
        if (choice === "cook") return "home";
        if (["home", "chef", "skip"].includes(choice)) return choice;
        return defaultChoiceFor(type);
      }

      function getPlan() {
        const plan = {};
        normalizeDays(state.selectedDays).forEach((day) => {
          const saved = state.weeklyPlan?.[day] || {};
          plan[day] = {
            lunch: normalizeChoice(saved.lunch, "lunch"),
            dinner: normalizeChoice(saved.dinner, "dinner"),
          };
        });
        return plan;
      }

      function saveState() {
        state.selectedDays = normalizeDays(state.selectedDays);
        state.weeklyPlan = getPlan();
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      }

      function setScreen(index) {
        const nextScreen = clampScreen(index);
        direction = nextScreen >= state.currentScreen ? "forward" : "backward";
        state.currentScreen = nextScreen;
        saveState();
        render();
      }

      function nextScreen() {
        setScreen(state.currentScreen + 1);
      }

      function previousScreen() {
        setScreen(state.currentScreen - 1);
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;");
      }

      function showStatus(message) {
        statusMessage = message;
        clearTimeout(statusTimer);
        render();
        statusTimer = setTimeout(() => {
          statusMessage = "";
          render();
        }, 2200);
      }

      function dietarySummaryText() {
        return state.answers.dietary.length
          ? `Sorting for ${state.answers.dietary.join(", ")}.`
          : "No filters yet. We will keep the plan flexible.";
      }

      function dietaryCountText() {
        return state.answers.dietary.length ? `${state.answers.dietary.length} selected` : "No preferences selected";
      }

      function syncDietaryDom() {
        document.querySelectorAll('[data-action="dietary"]').forEach((chipButton) => {
          const isActive = state.answers.dietary.includes(chipButton.dataset.chip);
          chipButton.classList.toggle("is-active", isActive);
          chipButton.setAttribute("aria-pressed", String(isActive));
        });
        const helper = document.querySelector("[data-dietary-helper]");
        const count = document.querySelector("[data-dietary-count]");
        if (helper) helper.textContent = dietarySummaryText();
        if (count) count.textContent = dietaryCountText();
      }

      function getChefSlots(plan = getPlan()) {
        return state.selectedDays.flatMap((day) => {
          const slots = [];
          if (plan[day]?.lunch === "chef") slots.push({ id: `${day}-lunch`, day, type: "lunch" });
          if (plan[day]?.dinner === "chef") slots.push({ id: `${day}-dinner`, day, type: "dinner" });
          return slots;
        });
      }

      function getCounts(plan = getPlan()) {
        return state.selectedDays.reduce(
          (totals, day) => {
            ["lunch", "dinner"].forEach((type) => {
              totals[plan[day]?.[type] || "skip"] += 1;
            });
            return totals;
          },
          { home: 0, chef: 0, skip: 0 },
        );
      }

      function scoreMeals() {
        const prefs = state.answers.dietary || [];
        return meals
          .map((meal, index) => {
            const dietScore = prefs.reduce((score, pref) => score + (meal.diets.includes(pref) ? 3 : 0), 0);
            const proteinScore = meal.protein >= Math.round(state.answers.proteinTarget / 4) ? 1 : 0;
            return { meal, score: dietScore + proteinScore - index / 100 };
          })
          .sort((a, b) => b.score - a.score)
          .map((item) => item.meal);
      }

      function getMealForSlot(slot, slotIndex) {
        const rankedMeals = scoreMeals();
        const savedMeal = meals.find((meal) => meal.id === state.mealSwaps?.[slot.id]);
        return savedMeal || rankedMeals[slotIndex % rankedMeals.length] || meals[0];
      }

      function cycleSlot(day, type) {
        const plan = getPlan();
        const current = plan[day]?.[type] || defaultChoiceFor(type);
        const next = current === "home" ? "chef" : current === "chef" ? "skip" : "home";
        state.weeklyPlan = {
          ...plan,
          [day]: {
            ...plan[day],
            [type]: next,
          },
        };
        saveState();
        render();
      }

      function swapMeal(slotId) {
        const slots = getChefSlots();
        const slotIndex = Math.max(
          slots.findIndex((slot) => slot.id === slotId),
          0,
        );
        const currentMeal = getMealForSlot(slots[slotIndex] || { id: slotId }, slotIndex);
        const rankedMeals = scoreMeals();
        const currentIndex = rankedMeals.findIndex((meal) => meal.id === currentMeal.id);
        const nextMeal = rankedMeals[(currentIndex + 1) % rankedMeals.length] || meals[0];
        state.mealSwaps = {
          ...state.mealSwaps,
          [slotId]: nextMeal.id,
        };
        saveState();
        showStatus(`Swapped to ${nextMeal.name}.`);
      }

      function slotLabel(choice) {
        if (choice === "chef") return "Prepared";
        if (choice === "skip") return "Skip";
        return "Cook";
      }

      function slotClass(choice) {
        if (choice === "chef") return "slot-chef";
        if (choice === "skip") return "slot-skip";
        return "slot-home";
      }

      function formatSlot(slot) {
        return `${dayNames[slot.day]} ${slot.type}`;
      }

      function reviewMealText(day, type, plan) {
        const choice = plan[day]?.[type];
        if (choice === "skip") return "Open";
        if (choice === "home") return type === "lunch" ? defaultRecipes.lunch : defaultRecipes.dinner;
        const slot = { id: `${day}-${type}`, day, type };
        const slotIndex = getChefSlots(plan).findIndex((chefSlot) => chefSlot.id === slot.id);
        const meal = getMealForSlot(slot, Math.max(slotIndex, 0));
        return `${meal.name} by Chef ${meal.chef}`;
      }

      function downloadPlan() {
        const plan = getPlan();
        const chefSlots = getChefSlots(plan);
        const lines = [
          "Batch by Platter - Weekly Meal Plan",
          "====================================",
          "",
          `Cooking style: ${cookingProfiles.find((profile) => profile.id === state.cookingStyle)?.summary || "Hybrid"}`,
          `Dietary preferences: ${state.answers.dietary.length ? state.answers.dietary.join(", ") : "Flexible"}`,
          `Selected days: ${state.selectedDays.map((day) => dayNames[day]).join(", ")}`,
          "",
        ];

        state.selectedDays.forEach((day) => {
          lines.push(dayNames[day].toUpperCase());
          ["lunch", "dinner"].forEach((type) => {
            lines.push(`${type[0].toUpperCase() + type.slice(1)}: ${reviewMealText(day, type, plan)}`);
          });
          lines.push("");
        });

        lines.push(`Prepared meals: ${chefSlots.length}`);
        lines.push("Partner code: BATCHPLTR20");

        const file = new Blob([lines.join("\n")], { type: "text/plain" });
        const url = URL.createObjectURL(file);
        const link = document.createElement("a");
        link.href = url;
        link.download = "batch-by-platter-meal-plan.txt";
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
        showStatus("Plan exported.");
      }

      function screenShell(kicker, title, index, content) {
        return `
          <article class="screen screen-${index + 1}">
            <div class="screen-header">
              <div class="kicker">${kicker}</div>
              <div class="screen-count">${index + 1}/${screenTitles.length}</div>
            </div>
            <h1>${title}</h1>
            ${content}
          </article>
        `;
      }

      function maybeDisabled(isPreview) {
        return isPreview ? "disabled" : "";
      }

      function renderScreen(index, isPreview = false) {
        const disabled = maybeDisabled(isPreview);
        const plan = getPlan();
        const counts = getCounts(plan);

        if (index === 1) {
          return screenShell(

            `
              <p class="lede">Pick the stretch you want Batch to cover first. You can still toggle individual days.</p>

        if (index === 3) {

              <div class="chip-grid">
                ${dietaryChips
                  .map((chip) => {
                    const isActive = state.answers.dietary.includes(chip);
                    return `<button type="button" class="chip ${isActive ? "is-active" : ""}" data-action="dietary" data-chip="${escapeHtml(chip)}" aria-pressed="${isActive}" ${disabled}>${chip}</button>`;
                  })

              <div class="helper-note" data-dietary-helper>${activeDietary}</div>

              <button type="button" class="primary-button" data-action="go" data-screen="4" ${disabled}>Build my week</button>
            `,
          );
        }

        if (index === 4) {
          return screenShell(
            "Prep",
            'Hang tight. We are <span class="accent-word">building</span> your week.',
            index,
            `
              <p class="lede">Your inputs are in the pot. Batch is sorting recipes, prepared meals, and prep notes into one usable plan.</p>
              <div class="prep-scene" aria-label="Batch is preparing your week">
                <span class="prep-steam steam-one"></span>
                <span class="prep-steam steam-two"></span>
                <span class="prep-steam steam-three"></span>
                <span class="prep-ingredient ingredient-one"></span>
                <span class="prep-ingredient ingredient-two"></span>
                <span class="prep-ingredient ingredient-three"></span>
                <span class="prep-ingredient ingredient-four"></span>
                <span class="prep-spark spark-one"></span>
                <span class="prep-spark spark-two"></span>
                <span class="prep-spark spark-three"></span>
                <div class="prep-pot" aria-hidden="true">
                  <span class="pot-rim"></span>
                  <span class="pot-body"></span>
                </div>
                <div class="prep-fire" aria-hidden="true"><span></span><span></span><span></span></div>
              </div>
              <div class="build-list prep-list">
                <div><span>Reading the days you selected</span><b></b></div>
                <div><span>Placing prepared meals where they help</span><b></b></div>
                <div><span>Drafting a week map you can edit</span><b></b></div>
              </div>
              <button type="button" class="secondary-button" data-action="go" data-screen="5" ${disabled}>Show the map</button>
            `,
          );

        if (index === 5) {
          return screenShell(
            "Week map",
            'Set the <span class="accent-word">role</span> for each meal.',
            index,
            `
              <p class="lede">Pre-filled from your ${cookingProfile.title.toLowerCase()} profile. Tap any slot to switch between Cook, Prepared, and Skip.</p>
              <div class="canvas-summary">
                <div class="stat-box"><strong>${counts.home}</strong><span>Cook</span></div>
                <div class="stat-box"><strong>${counts.chef}</strong><span>Prepared</span></div>
                <div class="stat-box"><strong>${counts.skip}</strong><span>Open</span></div>
              </div>
              <div class="day-plan-list">
                ${state.selectedDays
                  .map(
                    (day) => `
                      <div class="day-plan-card">
                        <div>
                          <strong>${dayNames[day]}</strong><br />
                          <small>${day} plan</small>
                        </div>
                        <div class="slot-grid">
                          ${["lunch", "dinner"]
                            .map((type) => {
                              const choice = plan[day]?.[type] || defaultChoiceFor(type);
                              return `
                                <button type="button" class="slot-button ${slotClass(choice)}" data-action="cycle-slot" data-day="${day}" data-type="${type}" ${disabled}>
                                  <span class="slot-label">${type}</span>
                                  <span>${slotLabel(choice)}</span>
                                </button>

                            .join("")}
                        </div>
                      </div>
                    `,
                  )
                  .join("")}
              </div>
              <button type="button" class="primary-button" data-action="go" data-screen="6" ${disabled}>Find prepared picks</button>
            `,
          );
        }

        if (index === 6) {
          const visibleChefSlots = isPreview ? chefSlots.slice(0, 2) : chefSlots;
          const chefContent = chefSlots.length
            ? `
              <div class="meal-match-list">
                ${visibleChefSlots
                  .map((slot, slotIndex) => {
                    const meal = getMealForSlot(slot, slotIndex);
                    return `
                      <div class="chef-card">
                        <div class="chef-card-head">
                          <span>${formatSlot(slot)}</span>
                          <span>Prepared pick</span>

                            <p>${meal.calories} kcal &middot; ${meal.protein}g protein &middot; ${meal.carbs}g carbs</p>

              <div class="empty-state">
                <strong>No prepared meals yet.</strong>
                <p>You chose a fully cooked-at-home week. To add backup, return to the map and switch any slot to Prepared.</p>
                <button type="button" class="secondary-button" data-action="go" data-screen="5" ${disabled}>Adjust map</button>
              </div>

          return screenShell(
            "Prepared picks",
            'Fresh meals for the slots you <span class="accent-word">marked.</span>',
            index,
            `
              <p class="lede">Matched to your preferences and schedule. Swap anything that does not feel like your week.</p>
              ${chefContent}
              <button type="button" class="primary-button" data-action="go" data-screen="7" ${disabled}>Review plan</button>
            `,
          );
        }

        if (index === 7) {
          const listPanel = `
            <div class="review-list">
              ${state.selectedDays
                .map(
                  (day) => `
                    <div class="review-card">
                      <div class="review-card-head">
                        <strong>${dayNames[day]}</strong>
                        <span>${day}</span>
                      </div>
                      <div class="review-row"><b>Lunch</b><small>${reviewMealText(day, "lunch", plan)}</small></div>
                      <div class="review-row"><b>Dinner</b><small>${reviewMealText(day, "dinner", plan)}</small></div>
                    </div>
                  `,
                )
                .join("")}
            </div>
          `;
          const timelinePanel = `
            <div class="timeline-list">
              <div><time>9:30 AM</time><span>Roast vegetables and cook the grain base for home lunches.</span></div>
              <div><time>10:10 AM</time><span>Blend green sauce, wash herbs, and portion breakfast jars.</span></div>
              <div><time>10:40 AM</time><span>Pack Monday and Tuesday lunches so the fridge has a clear first move.</span></div>
              <div><time>11:05 AM</time><span>Confirm prepared meals for the tightest dinner nights.</span></div>
            </div>
          `;

          return screenShell(
            "Review",
            'Review your <span class="accent-word">week.</span>',
            index,
            `
              <p class="lede">List first. Timeline if Sunday needs structure.</p>
              <div class="tab-bar" role="tablist" aria-label="Review views">
                <button type="button" role="tab" data-action="tab" data-tab="list" aria-selected="${state.shoppingTab === "list"}" class="${
              state.shoppingTab === "list" ? "is-active" : ""
            }" ${disabled}>List</button>
                <button type="button" role="tab" data-action="tab" data-tab="timeline" aria-selected="${state.shoppingTab === "timeline"}" class="${
              state.shoppingTab === "timeline" ? "is-active" : ""
            }" ${disabled}>Timeline</button>
              </div>
              ${state.shoppingTab === "timeline" ? timelinePanel : listPanel}
              <div class="delivery-card">
                <div class="delivery-row"><span>Prepared meals</span><strong>${chefSlots.length} selected</strong></div>
                <div class="delivery-row"><span>Partner code</span><strong>BATCHPLTR20</strong></div>
              </div>
              <button type="button" class="primary-button" data-action="go" data-screen="8" ${disabled}>Save my week</button>
            `,
          );
        }

        return screenShell(
          "Ready",
          'Your week is <span class="accent-word">set.</span>',
          index,
          `
            <div class="success-circle" aria-hidden="true">B</div>
            <p class="lede">Save the plan, send yourself the details, or make another pass.</p>
            <form class="lead-form" data-lead-form>
              <label for="plan-email">Get the plan by email.</label>
              <div class="lead-row">
                <input id="plan-email" name="email" type="email" inputmode="email" autocomplete="email" placeholder="you@example.com" value="${escapeHtml(state.leadEmail)}" ${disabled} />
                <button type="submit" ${disabled}>Save</button>
              </div>
              <small>${state.leadEmail ? `Saved for ${escapeHtml(state.leadEmail)}.` : "Your email stays with this plan request."}</small>
            </form>
            <div class="delivery-card">
              <div class="delivery-row">
                <div>
                  <span>Prepared picks</span>
                  <strong>Fresh meals for the week</strong>
                </div>
                <strong>${chefSlots.length}</strong>
              </div>
              <div class="mini-list">
                ${
                  chefSlots.length
                    ? chefSlots
                        .map((slot, slotIndex) => {
                          const meal = getMealForSlot(slot, slotIndex);
                          return `<div><span>${meal.name}</span><small>${slot.day} ${slot.type}</small></div>`;
                        })
                        .join("")
                    : `<div><span>All slots are cooked at home or left open.</span><small>No prepared picks</small></div>`
                }
              </div>
            </div>
            <div class="promo-card">
              <div class="promo-row">
                <div>
                  <span>Partner code</span>
                  <strong>BATCHPLTR20</strong>
                </div>
                <button type="button" class="text-button" data-action="copy-promo" ${disabled}>Copy</button>
              </div>
              <p>Use this if you decide to order prepared meals from a partner marketplace.</p>
            </div>
            <div class="button-pair">
              <button type="button" class="secondary-button" data-action="download-plan" ${disabled}>Export plan</button>
              <button type="button" class="secondary-button" data-action="reset-plan" ${disabled}>Plan another week</button>
            </div>
            <button type="button" class="primary-button" data-action="open-menu" ${disabled}>Browse prepared meals</button>
          `,
        );
      }

      function renderFlowAside(index) {
        const asideByScreen = [
          {
            label: "Platter planning",
            title: "A calmer way to decide what is for dinner.",
            copy: "Answer a few practical questions and Batch turns the week into recipes, prep notes, and prepared backup.",
            proof: [
              ["2 min", "To map the week"],
              ["5 days", "Pre-filled by default"],
              ["1 list", "For Sunday prep"],
            ],
          },
          {
            label: "Start with real life",
            title: "Weekdays, weekends, or the odd day off.",
            copy: "The plan begins with your calendar, so the meal map follows the week you actually have.",
            proof: [
              ["Mon-Fri", "Quick preset"],
              ["7 days", "Full-week option"],
              ["Edit", "Any day anytime"],
            ],
          },
          {
            label: "Cooking style",
            title: "Cook, outsource, or split it.",
            copy: "Batch uses this as a starting point, then lets every lunch and dinner be tuned by hand.",
            proof: [
              ["Cook", "Home recipes"],
              ["Prepared", "Fresh backup"],
              ["Skip", "Open slots"],
            ],
          },
          {
            label: "Personal filters",
            title: "Preferences without the spreadsheet feeling.",
            copy: "A few filters are enough to rank the plan around what sounds good and what fits.",
            proof: [
              ["Protein", "Goal-aware"],
              ["Dietary", "Easy filters"],
              ["Time", "Kept practical"],
            ],
          },
          {
            label: "Getting it ready",
            title: "The quiet middle step should feel worth the wait.",
            copy: "Batch turns the answers into an editable week map before it shows any recommendations.",
            proof: [
              ["Sort", "Days"],
              ["Match", "Meals"],
              ["Map", "Prep"],
            ],
          },
          {
            label: "Weekly map",
            title: "A plan you can correct in one tap.",
            copy: "Each slot has a role: cook at home, use a prepared pick, or leave it open.",
            proof: [
              ["Lunch", "Separate"],
              ["Dinner", "Separate"],
              ["Tap", "To switch"],
            ],
          },
          {
            label: "Prepared picks",
            title: "Backup meals that still feel chosen.",
            copy: "Matched dishes are slotted only where you asked for help, then kept easy to swap.",
            proof: [
              ["Fresh", "Ready meals"],
              ["Swap", "Any pick"],
              ["Scroll", "Full list"],
            ],
          },
          {
            label: "Final pass",
            title: "List first, timeline when Sunday needs structure.",
            copy: "The review step keeps the weekly plan scannable before it is saved.",
            proof: [
              ["List", "Meal view"],
              ["Timeline", "Prep view"],
              ["Save", "On device"],
            ],
          },
          {
            label: "Saved plan",
            title: "The week is ready without another decision loop.",
            copy: "Export it, revise it, or use the prepared picks when the week gets tight.",
            proof: [
              ["Export", "Text plan"],
              ["Revise", "Anytime"],
              ["Browse", "Prepared meals"],
            ],
          },
        ];
        const aside = asideByScreen[index] || asideByScreen[0];
        return `
          <aside class="flow-aside" aria-hidden="true">
            <div class="aside-copy">
              <span>${aside.label}</span>
              <strong>${aside.title}</strong>
              <p>${aside.copy}</p>
            </div>
            <div class="aside-collage">
              ${meals
                .map((meal) => `<img src="${meal.image}" alt="" />`)
                .join("")}
            </div>
            <div class="aside-proof">
              ${aside.proof
                .map(([value, label]) => `<div><strong>${value}</strong><span>${label}</span></div>`)
                .join("")}
            </div>
          </aside>
        `;
      }

      function renderTopBar() {
        const progressPercent = Math.round(((state.currentScreen + 1) / screenTitles.length) * 100);
        return `
          <header class="top-bar">
            <div>
              <a class="brand" href="/" aria-label="Platter homepage">platter</a>
              <span class="progress">${state.currentScreen + 1} of ${screenTitles.length} &middot; ${screenTitles[state.currentScreen]}</span>
            </div>
            <div class="top-progress" aria-label="Progress: step ${state.currentScreen + 1} of ${screenTitles.length}">
              <div class="progress-label"><span>Step ${state.currentScreen + 1} of ${screenTitles.length}</span><span>${screenTitles[state.currentScreen]}</span></div>
              <div class="progress-track"><span style="width: ${progressPercent}%"></span></div>
            </div>
            <div class="top-controls">
              <div class="mode-toggle" aria-label="View mode">
                <button type="button" class="${mode === "landing" ? "is-active" : ""}" data-action="mode" data-mode="landing">Overview</button>
                <button type="button" class="${mode === "flow" ? "is-active" : ""}" data-action="mode" data-mode="flow">Flow</button>
                <button type="button" class="${mode === "preview" ? "is-active" : ""}" data-action="mode" data-mode="preview">Preview</button>
              </div>
              <button type="button" class="nav-button" data-action="prev" ${state.currentScreen === 0 ? "disabled" : ""}>Back</button>
              <button type="button" class="nav-button" data-action="next" ${state.currentScreen === LAST_SCREEN ? "disabled" : ""}>Next</button>
            </div>
          </header>
        `;
      }

      function renderFlow() {
        return `
          <section class="flow-view" aria-label="${screenTitles[state.currentScreen]}">
            <div class="flow-primary">
              <div class="screen-stage ${direction === "forward" ? "enter-forward" : "enter-backward"}">
                ${renderScreen(state.currentScreen)}
              </div>
              <div class="flow-controls" aria-label="Step navigation">
                <button type="button" class="flow-control" data-action="prev" ${state.currentScreen === 0 ? "disabled" : ""}>Back</button>
                <button type="button" class="flow-control is-primary" data-action="next" ${state.currentScreen === LAST_SCREEN ? "disabled" : ""}>${state.currentScreen >= 7 ? "Finish" : "Next"}</button>
              </div>
            </div>
            ${renderFlowAside(state.currentScreen)}
          </section>
        `;
      }

      function renderPreview() {
        const shots = [
          {
            index: 0,
            title: "Start with the week you actually have.",
            copy: "Batch begins with the rhythm of real life, not an empty planning board.",
          },
          {
            index: 1,
            title: "Choose days without overthinking it.",
            copy: "Fast presets keep the first step light, with room to edit later.",
          },
          {
            index: 5,
            title: "See the week before it is saved.",
            copy: "Meal roles are mapped first, then every slot can be corrected.",
          },
          {
            index: 7,
            title: "Review the plan, list first.",
            copy: "A compact final pass keeps prep and prepared backup easy to scan.",
          },
        ];
        return `
          <section class="screens-page" aria-label="Batch beta screens">
            <header class="marketing-nav">
              <a class="brand" href="/" aria-label="Platter homepage">platter</a>
              <nav class="marketing-links" aria-label="Batch beta navigation">
                <button type="button" class="nav-cta" data-action="mode" data-mode="landing">Back to Batch</button>
                <button type="button" class="nav-cta" data-action="start-flow" data-screen="0">Open prototype</button>
              </nav>
            </header>

            <section class="screens-hero">
              <div class="landing-copy">
                <span class="landing-kicker">Beta preview</span>
                <h1>What Batch is becoming.</h1>
                <p>Batch is still in development. These screens show the direction: a mobile planner that turns everyday food decisions into a usable week.</p>
                <div class="landing-actions">
                  <button type="button" class="landing-button" data-action="start-flow" data-screen="0">Try the prototype</button>
                  <button type="button" class="landing-button is-secondary" data-action="mode" data-mode="landing">Return to overview</button>
                </div>
              </div>
              <aside class="screens-note">
                <strong>Waitlist opening soon.</strong>
                <p>We are polishing the beta before inviting readers in. Check back for the first waitlist release.</p>
              </aside>
            </section>

            <section class="screens-gallery" aria-label="Batch beta screen gallery">
              ${shots
              .map(
                (shot) => `
                  <article class="screen-shot">
                    <div class="preview-phone">${renderPreviewScreen(shot.index)}</div>
                    <strong>${shot.title}</strong>
                    <span>${shot.copy}</span>
                  </article>
                `,
              )
              .join("")}
            </section>
          </section>
        `;
      }

      function renderPreviewScreen(index) {
        return renderScreen(index, true)
          .replaceAll("<button", "<span")
          .replaceAll("</button>", "</span>")
          .replace(/<input[^>]*type="range"[^>]*>/g, '<span class="range-track" aria-hidden="true"></span>')
          .replace(/<input[^>]*type="email"[^>]*>/g, '<span class="lead-input-preview" aria-hidden="true"></span>');
      }

      function renderLanding() {
        return `
          <section class="marketing-page" id="top">
            <header class="marketing-nav">
              <a class="brand" href="/" aria-label="Platter homepage">platter</a>
              <nav class="marketing-links" aria-label="Batch sections">
                <a href="#how">How it works</a>
                <a href="#status">Beta status</a>
                <button type="button" class="nav-cta" data-action="open-preview">Beta preview</button>
              </nav>
            </header>

            <section class="marketing-hero" aria-labelledby="landing-title">
              <div class="landing-copy">
                <span class="beta-status">Beta in development</span>
                <h1 id="landing-title">Dinner planning, calmer.</h1>
                <p>Batch is Platter's mobile planning app in development. It will turn a few practical answers into a weekly plan: what to cook, what to prep, and where a prepared meal can take pressure off.</p>
                <div class="landing-actions">
                  <button type="button" class="landing-button" data-action="open-preview">Preview the beta</button>
                  <a class="landing-button is-secondary" href="/">Back to Platter</a>
                </div>
                <div class="landing-stats" aria-label="Batch highlights">
                  <div><strong>Beta</strong><span>Currently in build</span></div>
                  <div><strong>9 steps</strong><span>Prototype flow</span></div>
                  <div><strong>Soon</strong><span>Waitlist opening</span></div>
                </div>
              </div>
              <div class="landing-device" aria-label="Batch app preview">
                <div class="preview-phone landing-phone">${renderPreviewScreen(0)}</div>
                <span class="landing-caption">Mobile beta preview</span>
              </div>
            </section>

            <section class="landing-section" id="how">
              <span class="section-kicker">How it works</span>
              <h2>Decisions that make dinner happen.</h2>
              <div class="landing-grid">
                <article class="landing-card">
                  <span>01</span>
                  <h3>Map the week.</h3>
                  <p>Start with weekdays, the full week, or a custom rhythm that matches the calendar in front of you.</p>
                </article>
                <article class="landing-card">
                  <span>02</span>
                  <h3>Set the balance.</h3>
                  <p>Tell Batch where you want to cook, where you want backup, and what food guardrails matter.</p>
                </article>
                <article class="landing-card">
                  <span>03</span>
                  <h3>Review before saving.</h3>
                  <p>Review a list view or Sunday timeline, then keep the plan, export it, or send it to yourself.</p>
                </article>
              </div>
            </section>

            <section class="landing-section" id="status">
              <div class="landing-feature">
                <div class="landing-copy">
                  <span class="section-kicker">Beta status</span>
                  <h2>We are shaping the first private beta.</h2>
                  <p>The app is being tuned around the parts of meal planning that usually break: blank calendars, overbuilt filters, grocery math, and the backup meal no one wants to admit they need.</p>
                  <div class="landing-actions">
                    <button type="button" class="landing-button" data-action="open-preview">See beta screens</button>
                    <button type="button" class="landing-button is-secondary" data-action="start-flow" data-screen="0">Open prototype</button>
                  </div>
                </div>
                <div class="beta-panel">
                  <strong>Waitlist opening soon.</strong>
                  <p>Batch is not open for public signup yet. The next version will invite readers into a tighter mobile beta.</p>
                  <div class="beta-panel-row" aria-label="Beta milestones">
                    <span><b>Now</b> Prototype polish</span>
                    <span><b>Next</b> Waitlist</span>
                    <span><b>Then</b> Private beta</span>
                  </div>
                </div>
              </div>
            </section>

            <section class="landing-section" id="index">
              <span class="section-kicker">Food planning index</span>
              <h2>Built into Platter's food index.</h2>
              <div class="landing-index">
                <article class="landing-card">
                  <span>Guides</span>
                  <h3>Weeknight systems.</h3>
                  <p>Practical explainers for deciding what belongs in the fridge, pantry, and backup stack.</p>
                </article>
                <article class="landing-card">
                  <span>Reviews</span>
                  <h3>Prepared meals.</h3>
                  <p>Neutral scoring for taste, menu depth, ordering flow, freshness, and value.</p>
                </article>
                <article class="landing-card">
                  <span>Recipes</span>
                  <h3>Home cooking.</h3>
                  <p>Recipes that can slot into a real weekly plan instead of living in a saved tab forever.</p>
                </article>
                <article class="landing-card">
                  <span>Newsletter</span>
                  <h3>The weekly brief.</h3>
                  <p>A concise food planning note that points readers to the best next move.</p>
                </article>
              </div>
            </section>

            <footer class="marketing-footer">
              <a class="brand" href="/" aria-label="Platter homepage">platter</a>
              <span>Batch is Platter's weekly food planning tool.</span>
            </footer>
          </section>
        `;
      }

      function render() {
        clearTimeout(prepTimer);
        const app = document.querySelector("#app");
        const toast = statusMessage ? `<div class="toast" role="status">${escapeHtml(statusMessage)}</div>` : "";
        app.innerHTML =
          mode === "landing"
            ? toast + renderLanding()
            : mode === "preview"
              ? toast + renderPreview()
              : renderTopBar() + toast + renderFlow();

        if (mode === "flow" && state.currentScreen === 4) {
          prepTimer = setTimeout(() => setScreen(5), 4800);
        }
      }

      document.addEventListener("click", (event) => {
        const button = event.target.closest('button, [data-action="preview-screen"]');
        if (!button || button.disabled) return;

        const action = button.dataset.action;

        if (action === "start-flow") {
          mode = "flow";
          setScreen(Number(button.dataset.screen || 0));
        }

        if (action === "open-preview") {
          mode = "preview";
          render();
        }

        if (action === "go") {
          setScreen(Number(button.dataset.screen));
        }

        if (action === "next") {
          nextScreen();
        }

        if (action === "prev") {
          previousScreen();
        }

        if (action === "mode") {
          mode = button.dataset.mode;
          render();
        }

        if (action === "preview-screen") {
          mode = "flow";
          setScreen(Number(button.dataset.screen));
        }

        if (action === "preset-days") {
          const count = Number(button.dataset.count);
          state.selectedDays = count === 7 ? [...dayOrder] : ["Mon", "Tue", "Wed", "Thu", "Fri"];
          state.answers.q2Answer = count === 7 ? "7-day-week" : "5-day-week";
          state.weeklyPlan = {};
          state.mealSwaps = {};
          saveState();
          render();
        }

        if (action === "toggle-day") {
          const day = button.dataset.day;
          if (!dayOrder.includes(day)) return;
          if (state.selectedDays.includes(day)) {
            if (state.selectedDays.length === 1) {
              showStatus("Keep at least one day planned.");
              return;
            }
            state.selectedDays = state.selectedDays.filter((item) => item !== day);
          } else {
            state.selectedDays = normalizeDays([...state.selectedDays, day]);
          }
          state.answers.q2Answer = `${state.selectedDays.length}-day-custom`;
          saveState();
          render();
        }

        if (action === "cooking-style") {
          state.cookingStyle = button.dataset.style;
          state.weeklyPlan = {};
          state.mealSwaps = {};
          saveState();
          render();
        }

        if (action === "dietary") {
          const chip = button.dataset.chip;
          state.answers.dietary = state.answers.dietary.includes(chip)
            ? state.answers.dietary.filter((item) => item !== chip)
            : [...state.answers.dietary, chip];
          saveState();
          syncDietaryDom();
        }

        if (action === "cycle-slot") {
          cycleSlot(button.dataset.day, button.dataset.type);
        }

        if (action === "swap-meal") {
          swapMeal(button.dataset.slot);
        }

        if (action === "tab") {
          state.shoppingTab = button.dataset.tab === "timeline" ? "timeline" : "list";
          saveState();
          render();
        }

        if (action === "copy-promo") {
          if (navigator.clipboard?.writeText) {
            navigator.clipboard
              .writeText("BATCHPLTR20")
              .then(() => showStatus("Promo code copied."))
              .catch(() => showStatus("Promo code: BATCHPLTR20"));
          } else {
            showStatus("Promo code: BATCHPLTR20");
          }
        }

        if (action === "download-plan") {
          downloadPlan();
        }

        if (action === "reset-plan") {
          state = cloneDefaultState();
          direction = "backward";
          saveState();
          showStatus("Plan reset.");
        }

        if (action === "open-menu") {
          window.open(PREPARED_MEALS_URL, "_blank", "noopener,noreferrer");
          showStatus("Opening Platter reviews.");
        }
      });

      document.addEventListener("submit", (event) => {
        const form = event.target.closest("[data-lead-form]");
        if (!form) return;
        event.preventDefault();
        const email = String(new FormData(form).get("email") || "").trim();
        const looksValid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        if (!looksValid) {
          showStatus("Add a valid email to save the plan.");
          return;
        }
        state.leadEmail = email;
        saveState();
        showStatus("Email saved with this plan.");
      });

      document.addEventListener("keydown", (event) => {
        if (event.key !== "Enter" && event.key !== " ") return;
        const frame = event.target.closest('[data-action="preview-screen"]');
        if (!frame) return;
        event.preventDefault();
        mode = "flow";
        setScreen(Number(frame.dataset.screen));
      });

      document.addEventListener("pointerdown", (event) => {
        if (mode !== "flow") return;
        if (!event.target.closest(".screen-stage")) return;
        pointerStartX = event.clientX;
      });

      document.addEventListener("pointerup", (event) => {
        if (mode !== "flow") return;
        if (pointerStartX === null || !event.target.closest(".screen-stage")) return;
        const deltaX = event.clientX - pointerStartX;
        pointerStartX = null;
        if (Math.abs(deltaX) < 56) return;
        if (deltaX < 0 && state.currentScreen < LAST_SCREEN) nextScreen();
        if (deltaX > 0 && state.currentScreen > 0) previousScreen();
      });

      render();
    </script>
  </body>
</html>
