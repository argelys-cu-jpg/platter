<!doctype html>
<html lang="en">
  <head>
<meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Batch by Platter - Weekly Menu Builder</title>
    <meta name="description" content="Batch by Platter turns a few practical answers into a weekly menu plan with recipes, prep notes, and prepared meal backup where it helps." />
    <meta name="batch-build" content="platter-system-2026-07-17" />
    <link rel="stylesheet" href="/global.css" />
</head>
  <body>
    <div class="platter-announcement-bar"><a href="/reviews/">The 2026 Prepared Meal Index is live &rarr;</a></div>
    <main id="app" class="batch-page"></main>
    <script>
      const STORAGE_KEY = "batch_flow";
      const LAST_SCREEN = 8;
      const PREPARED_MEALS_URL = "https://readplatter.com/reviews/";
      const screenTitles = ["Welcome", "Days", "Cooking", "Preferences", "Prep", "Week map", "Prepared picks", "Review", "Ready"];
      const dayOrder = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"];
      const dayNames = {
        Mon: "Monday",
        Tue: "Tuesday",
        Wed: "Wednesday",
        Thu: "Thursday",
        Fri: "Friday",
        Sat: "Saturday",
        Sun: "Sunday",
      };
      const heroMealPhoto =
        "https://cu-media.imgix.net/meal-service/meals/6774/main_image/6774_2_Cat_Cora_Grilled_Citrus_Salmon_Turmeric_Toasted_Couscous_3716.jpg?height=800&width=800&fit=crop&format=webp&cs=tinysrgb&lossless=true?w=3840";
      const recommendedMealPhoto =
        "https://cu-media.imgix.net/meal-service/meals/2954/main_image/006_Esther-Choi_Chicken-soba-salad-with-sesame_lowres.jpg?height=800&width=800&fit=crop&format=webp&cs=tinysrgb&lossless=true?w=3840";
      const defaultRecipes = {
        lunch: "Fresh Avocado & Hummus Wrap with crisp garden greens",
        dinner: "Sauteed Lemon Garlic Shrimp with roasted asparagus and herbed wild rice",
      };
      const dietaryChips = [
        "High protein",
        "Vegetarian",
        "Gluten free",
        "Dairy free",
        "Keto/low-carb",
        "Pescatarian",
        "Vegan",
        "Healthy balance",
      ];
      const cookingProfiles = [
        {
          id: "scratch",
          mark: "01",
          title: "Hands-on",
          detail: "I want recipes for most meals, with backup only where the week gets tight.",
          summary: "Mostly cooking",
        },
        {
          id: "hybrid",
          mark: "02",
          title: "Balanced",
          detail: "Some meals cooked at home, some prepared by independent chefs.",
          summary: "Cook and prepared",
        },
        {
          id: "zero-prep",
          mark: "03",
          title: "Prepared-forward",
          detail: "I want the week mostly covered by fresh, ready-to-heat meals.",
          summary: "Mostly prepared",
        },
      ];
      const meals = [
        {
          id: "soba",
          name: "Soba Noodle Salad with Chicken",
          chef: "Esther Choi",
          calories: 520,
          protein: 36,
          carbs: 42,
          diets: ["High protein", "Dairy free", "Healthy balance"],
          image: recommendedMealPhoto,
        },
        {
          id: "salmon",
          name: "Seared Citrus Garlic Herb Salmon",
          chef: "Cat Cora",
          calories: 580,
          protein: 38,
          carbs: 24,
          diets: ["High protein", "Pescatarian", "Gluten free"],
          image: heroMealPhoto,
        },
        {
          id: "bucatini",
          name: "Lentil Bolognese Bucatini",
          chef: "Art Smith",
          calories: 510,
          protein: 24,
          carbs: 64,
          diets: ["Vegetarian", "Vegan", "Dairy free"],
          image:
            "https://cu-media.imgix.net/meal-service/meals/7000/main_image/7000_art-smith_lentil-bolognese-with-bucatini-pasta_wb_lo-res.jpg?height=800&width=800&fit=crop&format=webp&cs=tinysrgb&lossless=true?w=3840",
        },
        {
          id: "chicken",
          name: "Spiced Chicken with Roasted Broccoli",
          chef: "Ruben Garcia",
          calories: 540,
          protein: 41,
          carbs: 18,
          diets: ["High protein", "Gluten free", "Keto/low-carb"],
          image:
            "https://cu-media.imgix.net/media/catalog/product/cache/x600//r/u/ruben-spiced-chicken.jpeg?height=800&width=800&fit=crop&format=webp&cs=tinysrgb&lossless=true?w=3840",
        },
      ];

      const defaultState = {
        currentScreen: 0,
        answers: {
          q2Answer: "5-day-week",
          dietary: ["High protein"],
          proteinTarget: 125,
          cookTime: "30 min max",
        },
        selectedDays: ["Mon", "Tue", "Wed", "Thu", "Fri"],
        cookingStyle: "hybrid",
        weeklyPlan: {},
        mealSwaps: {},
        shoppingTab: "list",
        endState: null,
        leadEmail: "",
      };

      let state = readState();
      let mode = "landing";
      let direction = "forward";
      let pointerStartX = null;
      let statusMessage = "";
      let statusTimer = null;
      let prepTimer = null;

      function cloneDefaultState() {
        return structuredClone(defaultState);
      }

      function clampScreen(index) {
        return Math.min(Math.max(Math.round(Number(index) || 0), 0), LAST_SCREEN);
      }

      function clampProtein(value) {
        return Math.min(Math.max(Math.round((Number(value) || 125) / 5) * 5, 70), 180);
      }

      function normalizeDays(days) {
        if (!Array.isArray(days)) return [...defaultState.selectedDays];
        const clean = days.filter((day, index) => dayOrder.includes(day) && days.indexOf(day) === index);
        return clean.length ? clean.sort((a, b) => dayOrder.indexOf(a) - dayOrder.indexOf(b)) : [...defaultState.selectedDays];
      }

      function readState() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return cloneDefaultState();
          const parsed = JSON.parse(raw);
          return {
            currentScreen: clampScreen(parsed.currentScreen),
            answers: {
              q2Answer: typeof parsed.answers?.q2Answer === "string" ? parsed.answers.q2Answer : "5-day-week",
              dietary: Array.isArray(parsed.answers?.dietary) ? parsed.answers.dietary.filter(Boolean) : ["High protein"],
              proteinTarget: clampProtein(parsed.answers?.proteinTarget),
              cookTime: typeof parsed.answers?.cookTime === "string" ? parsed.answers.cookTime : "30 min max",
            },
            selectedDays: normalizeDays(parsed.selectedDays),
            cookingStyle: ["scratch", "hybrid", "zero-prep"].includes(parsed.cookingStyle) ? parsed.cookingStyle : "hybrid",
            weeklyPlan: typeof parsed.weeklyPlan === "object" && parsed.weeklyPlan ? parsed.weeklyPlan : {},
            mealSwaps: typeof parsed.mealSwaps === "object" && parsed.mealSwaps ? parsed.mealSwaps : {},
            shoppingTab: parsed.shoppingTab === "timeline" ? "timeline" : "list",
            endState: parsed.endState === "share" || parsed.endState === "start" ? parsed.endState : null,
            leadEmail: typeof parsed.leadEmail === "string" ? parsed.leadEmail : "",
          };
        } catch {
          return cloneDefaultState();
        }
      }

      function defaultChoiceFor(type) {
        if (state.cookingStyle === "scratch") return "home";
        if (state.cookingStyle === "zero-prep") return "chef";
        return type === "lunch" ? "home" : "chef";
      }

      function normalizeChoice(choice, type) {
        if (choice === "cook") return "home";
        if (["home", "chef", "skip"].includes(choice)) return choice;
        return defaultChoiceFor(type);
      }

      function getPlan() {
        const plan = {};
        normalizeDays(state.selectedDays).forEach((day) => {
          const saved = state.weeklyPlan?.[day] || {};
          plan[day] = {
            lunch: normalizeChoice(saved.lunch, "lunch"),
            dinner: normalizeChoice(saved.dinner, "dinner"),
          };
        });
        return plan;
      }

      function saveState() {
        state.selectedDays = normalizeDays(state.selectedDays);
        state.weeklyPlan = getPlan();
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      }

      function setScreen(index) {
        const nextScreen = clampScreen(index);
        direction = nextScreen >= state.currentScreen ? "forward" : "backward";
        state.currentScreen = nextScreen;
        saveState();
        render();
      }

      function nextScreen() {
        setScreen(state.currentScreen + 1);
      }

      function previousScreen() {
        setScreen(state.currentScreen - 1);
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;");
      }

      function showStatus(message) {
        statusMessage = message;
        clearTimeout(statusTimer);
        render();
        statusTimer = setTimeout(() => {
          statusMessage = "";
          render();
        }, 2200);
      }

      function dietarySummaryText() {
        return state.answers.dietary.length
          ? `Sorting for ${state.answers.dietary.join(", ")}.`
          : "No filters yet. We will keep the plan flexible.";
      }

      function dietaryCountText() {
        return state.answers.dietary.length ? `${state.answers.dietary.length} selected` : "No preferences selected";
      }

      function syncDietaryDom() {
        document.querySelectorAll('[data-action="dietary"]').forEach((chipButton) => {
          const isActive = state.answers.dietary.includes(chipButton.dataset.chip);
          chipButton.classList.toggle("is-active", isActive);
          chipButton.setAttribute("aria-pressed", String(isActive));
        });
        const helper = document.querySelector("[data-dietary-helper]");
        const count = document.querySelector("[data-dietary-count]");
        if (helper) helper.textContent = dietarySummaryText();
        if (count) count.textContent = dietaryCountText();
      }

      function getChefSlots(plan = getPlan()) {
        return state.selectedDays.flatMap((day) => {
          const slots = [];
          if (plan[day]?.lunch === "chef") slots.push({ id: `${day}-lunch`, day, type: "lunch" });
          if (plan[day]?.dinner === "chef") slots.push({ id: `${day}-dinner`, day, type: "dinner" });
          return slots;
        });
      }

      function getCounts(plan = getPlan()) {
        return state.selectedDays.reduce(
          (totals, day) => {
            ["lunch", "dinner"].forEach((type) => {
              totals[plan[day]?.[type] || "skip"] += 1;
            });
            return totals;
          },
          { home: 0, chef: 0, skip: 0 },
        );
      }

      function scoreMeals() {
        const prefs = state.answers.dietary || [];
        return meals
          .map((meal, index) => {
            const dietScore = prefs.reduce((score, pref) => score + (meal.diets.includes(pref) ? 3 : 0), 0);
            const proteinScore = meal.protein >= Math.round(state.answers.proteinTarget / 4) ? 1 : 0;
            return { meal, score: dietScore + proteinScore - index / 100 };
          })
          .sort((a, b) => b.score - a.score)
          .map((item) => item.meal);
      }

      function getMealForSlot(slot, slotIndex) {
        const rankedMeals = scoreMeals();
        const savedMeal = meals.find((meal) => meal.id === state.mealSwaps?.[slot.id]);
        return savedMeal || rankedMeals[slotIndex % rankedMeals.length] || meals[0];
      }

      function cycleSlot(day, type) {
        const plan = getPlan();
        const current = plan[day]?.[type] || defaultChoiceFor(type);
        const next = current === "home" ? "chef" : current === "chef" ? "skip" : "home";
        state.weeklyPlan = {
          ...plan,
          [day]: {
            ...plan[day],
            [type]: next,
          },
        };
        saveState();
        render();
      }

      function swapMeal(slotId) {
        const slots = getChefSlots();
        const slotIndex = Math.max(
          slots.findIndex((slot) => slot.id === slotId),
          0,
        );
        const currentMeal = getMealForSlot(slots[slotIndex] || { id: slotId }, slotIndex);
        const rankedMeals = scoreMeals();
        const currentIndex = rankedMeals.findIndex((meal) => meal.id === currentMeal.id);
        const nextMeal = rankedMeals[(currentIndex + 1) % rankedMeals.length] || meals[0];
        state.mealSwaps = {
          ...state.mealSwaps,
          [slotId]: nextMeal.id,
        };
        saveState();
        showStatus(`Swapped to ${nextMeal.name}.`);
      }

      function slotLabel(choice) {
        if (choice === "chef") return "Prepared";
        if (choice === "skip") return "Skip";
        return "Cook";
      }

      function slotClass(choice) {
        if (choice === "chef") return "slot-chef";
        if (choice === "skip") return "slot-skip";
        return "slot-home";
      }

      function formatSlot(slot) {
        return `${dayNames[slot.day]} ${slot.type}`;
      }

      function reviewMealText(day, type, plan) {
        const choice = plan[day]?.[type];
        if (choice === "skip") return "Open";
        if (choice === "home") return type === "lunch" ? defaultRecipes.lunch : defaultRecipes.dinner;
        const slot = { id: `${day}-${type}`, day, type };
        const slotIndex = getChefSlots(plan).findIndex((chefSlot) => chefSlot.id === slot.id);
        const meal = getMealForSlot(slot, Math.max(slotIndex, 0));
        return `${meal.name} by Chef ${meal.chef}`;
      }

      function downloadPlan() {
        const plan = getPlan();
        const chefSlots = getChefSlots(plan);
        const lines = [
          "Batch by Platter - Weekly Meal Plan",
          "====================================",
          "",
          `Cooking style: ${cookingProfiles.find((profile) => profile.id === state.cookingStyle)?.summary || "Hybrid"}`,
          `Dietary preferences: ${state.answers.dietary.length ? state.answers.dietary.join(", ") : "Flexible"}`,
          `Selected days: ${state.selectedDays.map((day) => dayNames[day]).join(", ")}`,
          "",
        ];

        state.selectedDays.forEach((day) => {
          lines.push(dayNames[day].toUpperCase());
          ["lunch", "dinner"].forEach((type) => {
            lines.push(`${type[0].toUpperCase() + type.slice(1)}: ${reviewMealText(day, type, plan)}`);
          });
          lines.push("");
        });

        lines.push(`Prepared meals: ${chefSlots.length}`);
        lines.push("Plan code: BATCH-WEEK");

        const file = new Blob([lines.join("\n")], { type: "text/plain" });
        const url = URL.createObjectURL(file);
        const link = document.createElement("a");
        link.href = url;
        link.download = "batch-by-platter-meal-plan.txt";
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
        showStatus("Plan exported.");
      }

      function screenShell(kicker, title, index, content) {
        return `
          <article class="iphone-frame screen screen-${index + 1}" aria-label="Batch screen ${index + 1}">
            <div class="iphone-notch" aria-hidden="true">
              <span class="iphone-cam"></span>
              <span class="iphone-speaker"></span>
              <span class="iphone-sensor"></span>
            </div>
            <div class="iphone-screen">
              <div class="iphone-status" aria-hidden="true">
                <span>08:01 <span class="iphone-ampm">AM</span></span>
                <div class="iphone-radios">
                  <span>5G</span>
                  <span class="iphone-battery" aria-hidden="true"><span></span></span>
                </div>
              </div>
              <div class="iphone-content">
                <div class="screen-header">
                  <div class="kicker">${kicker}</div>
                  <div class="screen-count">${index + 1}/${screenTitles.length}</div>
                </div>
                <h1>${title}</h1>
                ${content}
              </div>
              <div class="iphone-home" aria-hidden="true"></div>
            </div>
          </article>
        `;
      }

      function maybeDisabled(isPreview) {
        return isPreview ? "disabled" : "";
      }

      function renderScreen(index, isPreview = false) {
        const disabled = maybeDisabled(isPreview);
        const plan = getPlan();
        const counts = getCounts(plan);
        const chefSlots = getChefSlots(plan);
        const cookingProfile = cookingProfiles.find((profile) => profile.id === state.cookingStyle) || cookingProfiles[1];

        if (index === 0) {
          return screenShell(
            "Batch by Platter",
            'Plan a week you will <span class="accent-word">actually eat.</span>',
            index,
            `
              <span class="eyebrow-pill">Meal planning for real life</span>
              <p class="lede">Answer a few quick questions. Get a realistic week: what to cook, what to prep, and what to leave open.</p>
              <button type="button" class="button-primary primary-button" data-action="go" data-screen="1" ${disabled}>Build my week</button>
              <div class="hero-plate" aria-hidden="true">
                <img src="${heroMealPhoto}" alt="" />
                <div class="hero-plate-note">Cook what you want. Batch covers the rest.</div>
              </div>
              <div class="discovery-strip" aria-label="Planning cues">
                <div class="discovery-chip"><span>Routine</span><span class="inline-separator" aria-hidden="true"> · </span><strong>Packable lunches</strong></div>
                <div class="discovery-chip"><span>Goal</span><span class="inline-separator" aria-hidden="true"> · </span><strong>High protein</strong></div>
                <div class="discovery-chip"><span>Backup</span><span class="inline-separator" aria-hidden="true"> · </span><strong>Prepared dinners</strong></div>
              </div>
            `,
          );
        }

        if (index === 1) {
          return screenShell(
            "Weekly rhythm",
            'Which <span class="accent-word">days</span> need a plan?',
            index,
            `
              <p class="lede">Pick the stretch you want Batch to cover first. You can still toggle individual days.</p>
              <div class="preset-grid">
                <button type="button" class="button-secondary preset-card ${state.selectedDays.length <= 5 ? "is-selected" : ""}" data-action="preset-days" data-count="5" ${disabled}>
                  <span>Weekdays</span><span class="inline-separator" aria-hidden="true"> · </span><strong>5 days</strong><span class="inline-separator" aria-hidden="true"> · </span><small>Monday through Friday</small>
                </button>
                <button type="button" class="button-secondary preset-card ${state.selectedDays.length === 7 ? "is-selected" : ""}" data-action="preset-days" data-count="7" ${disabled}>
                  <span>Full week</span><span class="inline-separator" aria-hidden="true"> · </span><strong>7 days</strong><span class="inline-separator" aria-hidden="true"> · </span><small>Weekend included</small>
                </button>
              </div>
              <div class="formula-card">
                <div class="formula-head">
                  <strong>Selected days</strong><span class="inline-separator" aria-hidden="true"> · </span><span>${state.selectedDays.length} active</span>
                </div>
                <div class="day-grid">
                  ${dayOrder
                    .map(
                      (day) => `
                        <button type="button" class="button-secondary day-chip ${state.selectedDays.includes(day) ? "is-active" : ""}" data-action="toggle-day" data-day="${day}" aria-pressed="${state.selectedDays.includes(
                        day,
                      )}" ${disabled}>${day}</button>
                      `,
                    )
                    .join("")}
                </div>
                <small>Keep at least one day on the board.</small>
              </div>
              <div class="choice-note">Selected: ${state.selectedDays.length === 7 ? "Full week" : `${state.selectedDays.length} planned days`}</div>
              <button type="button" class="button-primary primary-button" data-action="go" data-screen="2" ${disabled}>Continue</button>
            `,
          );
        }

        if (index === 2) {
          return screenShell(
            "Cooking profile",
            'How much do you want to <span class="accent-word">cook?</span>',
            index,
            `
              <p class="lede">Pick the closest fit. You can edit every lunch and dinner later.</p>
              <div class="profile-stack">
                ${cookingProfiles
                  .map((profile) => {
                    const isSelected = state.cookingStyle === profile.id;
                    return `
                      <button type="button" class="button-secondary profile-card ${isSelected ? "is-selected" : ""}" data-action="cooking-style" data-style="${profile.id}" aria-pressed="${isSelected}" ${disabled}>
                        <span class="profile-mark">${profile.mark}</span>
                        <span class="profile-meta">
                          <span>${isSelected ? "Selected" : "Option"}</span><span class="inline-separator" aria-hidden="true"> · </span><strong>${profile.title}</strong><span class="inline-separator" aria-hidden="true"> · </span><small>${profile.detail}</small>
                        </span>
                      </button>
                    `;
                  })
                  .join("")}
              </div>
              <div class="choice-note">Selected: ${cookingProfile.summary}</div>
              <button type="button" class="button-primary primary-button" data-action="go" data-screen="3" ${disabled}>Continue</button>
            `,
          );
        }

        if (index === 3) {
          const activeDietary = state.answers.dietary.length
            ? dietarySummaryText()
            : dietarySummaryText();

          return screenShell(
            "Preferences",
            'Any food <span class="accent-word">guardrails?</span>',
            index,
            `
              <p class="lede">Pick what matters. Batch will shape the plan around it.</p>
              <div class="chip-grid">
                ${dietaryChips
                  .map((chip) => {
                    const isActive = state.answers.dietary.includes(chip);
                    return `<button type="button" class="button-secondary chip ${isActive ? "is-active" : ""}" data-action="dietary" data-chip="${escapeHtml(chip)}" aria-pressed="${isActive}" ${disabled}>${chip}</button>`;
                  })
                  .join("")}
              </div>
              <div class="helper-note" data-dietary-helper>${activeDietary}</div>
              <div class="choice-note" data-dietary-count>${dietaryCountText()}</div>
              <button type="button" class="button-primary primary-button" data-action="go" data-screen="4" ${disabled}>Build my week</button>
            `,
          );
        }

        if (index === 4) {
          return screenShell(
            "Prep",
            'Hang tight. We are <span class="accent-word">building</span> your week.',
            index,
            `
              <p class="lede">Your answers are in. Batch is matching recipes, prepared picks, and prep notes into one usable plan.</p>
              <div class="prep-scene" aria-label="Batch is preparing your week">
                <span class="prep-steam steam-one"></span>
                <span class="prep-steam steam-two"></span>
                <span class="prep-steam steam-three"></span>
                <span class="prep-ingredient ingredient-one"></span>
                <span class="prep-ingredient ingredient-two"></span>
                <span class="prep-ingredient ingredient-three"></span>
                <span class="prep-ingredient ingredient-four"></span>
                <span class="prep-spark spark-one"></span>
                <span class="prep-spark spark-two"></span>
                <span class="prep-spark spark-three"></span>
                <div class="prep-pot" aria-hidden="true">
                  <span class="pot-rim"></span>
                  <span class="pot-body"></span>
                </div>
                <div class="prep-fire" aria-hidden="true"><span></span><span></span><span></span></div>
              </div>
              <div class="build-list prep-list">
                <div><span>Reading your days</span><b></b></div>
                <div><span>Balancing cook and prepared</span><b></b></div>
                <div><span>Writing your shopping list</span><b></b></div>
              </div>
              <button type="button" class="button-secondary secondary-button" data-action="go" data-screen="5" ${disabled}>Show the map</button>
            `,
          );
        }

        if (index === 5) {
          return screenShell(
            "Week map",
            'Set the <span class="accent-word">role</span> for each meal.',
            index,
            `
              <p class="lede">Pre-filled from your ${cookingProfile.title.toLowerCase()} profile. Tap any slot to switch between Cook, Prepared, and Skip.</p>
              <div class="canvas-summary">
                <div class="stat-box"><strong>${counts.home}</strong><span class="inline-separator" aria-hidden="true"> · </span><span>Cook</span></div>
                <div class="stat-box"><strong>${counts.chef}</strong><span class="inline-separator" aria-hidden="true"> · </span><span>Prepared</span></div>
                <div class="stat-box"><strong>${counts.skip}</strong><span class="inline-separator" aria-hidden="true"> · </span><span>Open</span></div>
              </div>
              <div class="day-plan-list">
                ${state.selectedDays
                  .map(
                    (day) => `
                      <div class="day-plan-card">
                        <div>
                          <strong>${dayNames[day]}</strong><br />
                          <small>${day} plan</small>
                        </div>
                        <div class="slot-grid">
                          ${["lunch", "dinner"]
                            .map((type) => {
                              const choice = plan[day]?.[type] || defaultChoiceFor(type);
                              return `
                                <button type="button" class="button-secondary slot-button ${slotClass(choice)}" data-action="cycle-slot" data-day="${day}" data-type="${type}" ${disabled}>

                    <button type="submit" class="button-primary">${state.leadEmail ? "Update email" : "Join waitlist"}</button>
                  </div>
                  <small>${state.leadEmail ? `Saved for ${escapeHtml(state.leadEmail)}.` : "No spam. No charge while Batch is in beta."}</small>
                </form>
              </div>
            </section>

            <footer class="site-footer marketing-footer">
              <a class="brand" href="/" aria-label="Platter homepage">platter</a>
              <span>Batch is Platter's weekly menu builder.</span>
            </footer>
          </section>
        `;
      }

      function renderQuickJump() {
        const buttons = screenTitles
          .map(
            (title, index) => `
              <button
                type="button"
                class="button-secondary step ${state.currentScreen === index ? "active" : ""}"
                data-action="quickjump"
                data-screen="${index}"
                aria-label="Open screen ${index + 1}: ${escapeHtml(title)}"
              >S${index + 1}</button>
            `,
          )
          .join("");

        return `
          <nav class="simulator-quickjump" aria-label="Batch simulator quickjump">
            <strong>Simulator <span>Step ${state.currentScreen + 1}</span></strong>
            <div class="quickjump-grid simulator-steps step-indicator">${buttons}</div>
            <button type="button" class="button-secondary quickjump-reset" data-action="reset-plan">Reset state</button>
          </nav>
        `;
      }

      function render() {
        clearTimeout(prepTimer);
        const app = document.querySelector("#app");
        const toast = statusMessage ? `<div class="toast" role="status">${escapeHtml(statusMessage)}</div>` : "";
        const quickjump = renderQuickJump();
        app.innerHTML =
          mode === "landing"
            ? toast + renderLanding()
            : mode === "preview"
              ? toast + renderPreview()
              : renderTopBar() + toast + renderFlow() + quickjump;

        if (mode === "flow" && state.currentScreen === 4) {
          prepTimer = setTimeout(() => setScreen(5), 4800);
        }
      }

      document.addEventListener("click", (event) => {
        const button = event.target.closest('button, [data-action="preview-screen"]');
        if (!button || button.disabled) return;

        const action = button.dataset.action;

        if (action === "start-flow") {
          mode = "flow";
          setScreen(Number(button.dataset.screen || 0));
        }

        if (action === "open-preview") {
          mode = "preview";
          render();
        }

        if (action === "go") {
          setScreen(Number(button.dataset.screen));
        }

        if (action === "next") {
          nextScreen();
        }

        if (action === "prev") {
          previousScreen();
        }

        if (action === "mode") {
          mode = button.dataset.mode;
          render();
        }

        if (action === "preview-screen") {
          mode = "flow";
          setScreen(Number(button.dataset.screen));
        }

        if (action === "quickjump") {
          mode = "flow";
          setScreen(Number(button.dataset.screen));
        }

        if (action === "preset-days") {
          const count = Number(button.dataset.count);
          state.selectedDays = count === 7 ? [...dayOrder] : ["Mon", "Tue", "Wed", "Thu", "Fri"];
          state.answers.q2Answer = count === 7 ? "7-day-week" : "5-day-week";
          state.weeklyPlan = {};
          state.mealSwaps = {};
          saveState();
          render();
        }

        if (action === "toggle-day") {
          const day = button.dataset.day;
          if (!dayOrder.includes(day)) return;
          if (state.selectedDays.includes(day)) {
            if (state.selectedDays.length === 1) {
              showStatus("Keep at least one day planned.");
              return;
            }
            state.selectedDays = state.selectedDays.filter((item) => item !== day);
          } else {
            state.selectedDays = normalizeDays([...state.selectedDays, day]);
          }
          state.answers.q2Answer = `${state.selectedDays.length}-day-custom`;
          saveState();
          render();
        }

        if (action === "cooking-style") {
          state.cookingStyle = button.dataset.style;
          state.weeklyPlan = {};
          state.mealSwaps = {};
          saveState();
          render();
        }

        if (action === "dietary") {
          const chip = button.dataset.chip;
          state.answers.dietary = state.answers.dietary.includes(chip)
            ? state.answers.dietary.filter((item) => item !== chip)
            : [...state.answers.dietary, chip];
          saveState();
          syncDietaryDom();
        }

        if (action === "cycle-slot") {
          cycleSlot(button.dataset.day, button.dataset.type);
        }

        if (action === "swap-meal") {
          swapMeal(button.dataset.slot);
        }

        if (action === "tab") {
          state.shoppingTab = button.dataset.tab === "timeline" ? "timeline" : "list";
          saveState();
          render();
        }

        if (action === "copy-promo") {
          if (navigator.clipboard?.writeText) {
            navigator.clipboard
              .writeText("BATCH-WEEK")
              .then(() => showStatus("Plan code copied."))
              .catch(() => showStatus("Plan code: BATCH-WEEK"));
          } else {
            showStatus("Plan code: BATCH-WEEK");
          }
        }

        if (action === "download-plan") {
          downloadPlan();
        }

        if (action === "reset-plan") {
          state = cloneDefaultState();
          direction = "backward";
          saveState();
          showStatus("Plan reset.");
        }

        if (action === "open-menu") {
          window.open(PREPARED_MEALS_URL, "_blank", "noopener,noreferrer");
          showStatus("Opening Platter reviews.");
        }
      });

      document.addEventListener("submit", (event) => {
        const form = event.target.closest("[data-lead-form]");
        if (!form) return;
        event.preventDefault();
        const email = String(new FormData(form).get("email") || "").trim();
        const looksValid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        if (!looksValid) {
          showStatus("Add a valid email to save the plan.");
          return;
        }
        state.leadEmail = email;
        saveState();
        showStatus("Email saved with this plan.");
      });

      document.addEventListener("keydown", (event) => {
        if (event.key !== "Enter" && event.key !== " ") return;
        const frame = event.target.closest('[data-action="preview-screen"]');
        if (!frame) return;
        event.preventDefault();
        mode = "flow";
        setScreen(Number(frame.dataset.screen));
      });

      document.addEventListener("pointerdown", (event) => {
        if (mode !== "flow") return;
        if (!event.target.closest(".screen-stage")) return;
        pointerStartX = event.clientX;
      });

      document.addEventListener("pointerup", (event) => {
        if (mode !== "flow") return;
        if (pointerStartX === null || !event.target.closest(".screen-stage")) return;
        const deltaX = event.clientX - pointerStartX;
        pointerStartX = null;
        if (Math.abs(deltaX) < 56) return;
        if (deltaX < 0 && state.currentScreen < LAST_SCREEN) nextScreen();
        if (deltaX > 0 && state.currentScreen > 0) previousScreen();
      });

      function applyUrlParams() {
        try {
          const params = new URLSearchParams(location.search);
          const screenParam = params.get("screen");
          const modeParam = params.get("mode");
          if (screenParam !== null) {
            state.currentScreen = clampScreen(screenParam);
          }
          if (["flow", "landing", "preview"].includes(modeParam)) {
            mode = modeParam;
          } else if (screenParam !== null && modeParam === null) {
            mode = "flow";
          }
        } catch {}
      }

      applyUrlParams();
      render();
    </script>
  </body>
</html>
